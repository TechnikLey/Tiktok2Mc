name: Deploy mdBook site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: 0.4.36
      MDBOOK_ADMONISH_VERSION: 1.15.0
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 https://sh.rustup.rs -sSf -y | sh
          rustup update
      - name: Install mdBook
        run: cargo install --version ${MDBOOK_VERSION} mdbook
      - name: Install mdbook-admonish
        run: cargo install --version ${MDBOOK_ADMONISH_VERSION} mdbook-admonish
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build dev-book-de with admonish
        run: build docs/dev-book-de --dest-dir ../../public/de
      - name: Build dev-book-en with admonish
        run: build docs/dev-book-en --dest-dir ../../public/en
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
